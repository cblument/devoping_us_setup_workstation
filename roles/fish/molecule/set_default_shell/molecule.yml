---
# Tests fish installation via PPA + setting fish as the default login shell.
# Ubuntu 26.04 is excluded because the fish-shell/release-4 PPA does not
# yet publish packages for Plucky.
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: ubuntu-jammy
    image: docker.io/ubuntu:22.04
    pre_build_image: true
  - name: ubuntu-noble
    image: docker.io/ubuntu:24.04
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
verifier:
  name: ansible
