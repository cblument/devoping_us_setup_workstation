---
# Tests fish installation via PPA (fish_install_from_ppa: true).
# Ubuntu 26.04 (resolute) is excluded: apt-key has been removed from Ubuntu's
# apt package on 26.04, and ansible.builtin.apt_repository's fallback GPG-key
# import path (raw `gpg --export`, used when apt-key is absent) does not
# actually fetch keys from the keyserver with modern GnuPG — it silently
# imports nothing. This is an ansible-core limitation, not a PPA packaging
# gap; the PPA itself does publish resolute packages. Use the no_ppa scenario
# to test on 26.04.
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: ubuntu-jammy
    image: docker.io/ubuntu:22.04
    pre_build_image: true
  - name: ubuntu-noble
    image: docker.io/ubuntu:24.04
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
verifier:
  name: ansible
