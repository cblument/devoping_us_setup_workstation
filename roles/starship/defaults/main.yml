---
# Installation method: "script" (official install.sh) or "package" (Homebrew on macOS, cargo on Debian)
starship_install_method: script

# Shell(s) to configure starship init in. List any of: fish, bash, zsh
# Defaults to the invoking user's login shell on the target system.
starship_configure_shells: "{{ [ansible_user_shell | basename] }}"

# Optional: path to a starship.toml to deploy; leave empty to skip
starship_config_src: ""

# Directory where starship.toml is placed (XDG default)
starship_config_dir: "{{ ansible_env.HOME }}/.config"
